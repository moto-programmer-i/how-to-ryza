<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主要素材の採取場所</title>
    <link rel="stylesheet" href="../styles.css" />
    <script src="../common.js" defer></script>
</head>
<body>
    <h1 id="paper"><span id="tough_vine"></span>紙くず、丈夫なつる</h1>
    <p>
        採取地調合器で X92D
    </p>
    <img src="paper.jpg" alt="X92D">
    <hr>


    <h1 id="foamy_water">泡立つ水</h1>
    <p>
        リーゼ峡谷の谷間の参道口から水場の採取ポイント
    </p>
    <img src="foamy_water.jpg" alt="泡立つ水の採取ポイント">
    <img src="foamy_water2.jpg" alt="泡立つ水">
    <hr>

    <h1 id="beehive">金のハチの巣、銀のハチの巣</h1>
    <p>
        ピオニール聖塔の古き聖地の庭からマップ右上の木の採取ポイントでハンマー<br>
        (他の場所で大量にとれるが、ここでとれる物の方が品質が高め)

    </p>
    <img src="sanctuary_garden.jpg" alt="古き聖地の庭">
    <img src="sanctuary_garden2.jpg" alt="古き聖地の庭">
    <img src="beehive.jpg" alt="ハチの巣">
    <hr>

    <h1 id="nectar_rock">甘露岩</h1>
    <p>
        採取地 SRDI （最後は数字の１ではなく、アルファベットのアイ）
    </p>
    <img src="nectar_rock.jpg" alt="SRDI">

    <h1 id="stalactite_fragment">鍾乳石の欠片</h1>
    <p>
        火山ヴァイスベルグの山間の隠れ里から入ってすぐの採取ポイントで斧
    </p>
    <img src="stalactite_fragment.jpg" alt="山間の隠れ里">
    <img src="stalactite_fragment2.jpg" alt="採取ポイント">
    <img src="stalactite_fragment3.jpg" alt="斧">
    <img src="stalactite_fragment4.jpg" alt="鍾乳石の欠片">
    <hr>
</body>
</html>
